<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #d1 {
        width: 300px;
        height: 300px;
        background-color: red;
        animation-name: bgcartoon;
        animation-duration: 5s;
        animation-iteration-count: infinite;
        display: grid;
        place-items: center;
      }
      #d1::after {
        content: "す";
        font-size: 100px;
        color: pink;
        font-weight: bold;
        animation-name: text;
        animation-duration: 5s ;
        animation-iteration-count: infinite;
      }

      @keyframes bgcartoon {
        0% {
          background-color: red;
        }
        25% {
          background-color: yellow;
        }
        50% {
          background-color: rgb(0, 225, 255);
        }
        75% {
          background-color: rgb(64, 0, 255);
        }
        100% {
          background-color: rgb(30, 255, 0);
        }
      }
      @keyframes text {
        0% {
          content: "す";
        }
        25% {
          content: "き";
        }
        50% {
          content: "だ";
        }
        75% {
          content: "よ";
        }
        100% {
          content: "す";
        }
      }
    </style>
  </head>
  <body>
    <div id="d1"></div>
  </body>
</html>
